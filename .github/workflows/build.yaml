name: Build Status

on:
  push:
    branches:
      - main
    tags:
      - v*
    paths-ignore:
      - docs/
      - LICENSE
      - README.md
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: write
  checks: write
  pull-requests: write

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11"]
        node-version: [22.x]

    steps:
<<<<<<< before updating
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        lfs: true
=======
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
>>>>>>> after updating

    - uses: actions-ext/python/setup@main
      with:
        version: ${{ matrix.python-version }}

    - uses: actions-ext/node/setup@main
      with:
        version: ${{ matrix.node-version }}

    - name: Install pandoc via brew
      run: brew install pandoc
      if: ${{ matrix.os == 'macos-latest' }}

    - name: Install pandoc via apt
      run: sudo apt install pandoc
      if: ${{ matrix.os == 'ubuntu-latest' }}

    - name: Install dependencies
      run: make develop

    - name: Install chromium
      run: playwright install chromium

    - name: Build
      run: make build

    - name: Lint
      run: make lint

    - name: Test
      run: make tests
      env:
        SMTP_HOST: ${{ secrets.SMTP_HOST }}
        SMTP_USER: ${{ secrets.SMTP_USER }}
        SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      if: ${{ matrix.os == 'ubuntu-latest' }}

    - name: Integration tests
      run: make test-integration
      if: ${{ matrix.os == 'ubuntu-latest' }}

    - name: Upload Playwright report
      uses: actions/upload-artifact@v7
      with:
        name: playwright-report-${{ matrix.os }}
        path: js/playwright-report/
      if: ${{ always() && matrix.os == 'ubuntu-latest' }}

    - name: Upload Playwright test snapshots
      uses: actions/upload-artifact@v7
      with:
        name: playwright-snapshots-${{ matrix.os }}
        path: |
          js/tests/**/*-snapshots/
          js/test-results/
      if: ${{ failure() && matrix.os == 'ubuntu-latest' }}

    - name: Upload test results
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: test-results-${{ matrix.os }}-${{ matrix.python-version }}-${{ matrix.node-version }}
        path: '**/junit.xml'
      if: ${{ always() }}

    - name: Publish Unit Test Results
      uses: EnricoMi/publish-unit-test-result-action@d0a4676d0e0b938bc201470d88276b7c74c712b3 # v2.24.0
      with:
        files: '**/junit.xml'
      if: matrix.os == 'ubuntu-latest'

    - name: Upload coverage
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
      with:
        token: ${{ secrets.CODECOV_TOKEN }}

    - name: Upload generated reports (html)
      uses: actions/upload-artifact@v7
      id: upload-reports-html
      with:
        name: reports-html
        path: 'outputs/*.html'
        if-no-files-found: error
        overwrite: true
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == 3.11 && github.event_name == 'pull_request'

    - name: Upload generated reports (pdf)
      uses: actions/upload-artifact@v7
      id: upload-reports-pdf
      with:
        name: reports-pdf
        path: 'outputs/*.pdf'
        if-no-files-found: error
        overwrite: true
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == 3.11 && github.event_name == 'pull_request'

    - name: Find comment for generated reports
      uses: peter-evans/find-comment@v4
      id: find-comment
      with:
        issue-number: ${{ github.event.pull_request.number }}
        comment-author: 'github-actions[bot]'
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == 3.11 && github.event_name == 'pull_request'

    - name: Update comment for generated reports
      uses: peter-evans/create-or-update-comment@v5
      with:
        issue-number: ${{ github.event.pull_request.number }}
        comment-id: ${{ steps.find-comment.outputs.comment-id }}
        edit-mode: replace
        body: |-
            | Name                | Link                                                              |
            | :------------------ | :---------------------------------------------------------------- |
            | Test Reports (HTML) | [download](${{ steps.upload-reports-html.outputs.artifact-url }}) |
            | Test Reports (PDF)  | [download](${{ steps.upload-reports-pdf.outputs.artifact-url }})  |
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == 3.11 && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == 'nbprint/nbprint'

    - name: Make dist
      run: make dist
      if: matrix.os == 'ubuntu-latest'

    - uses: actions-ext/python/test-wheel@main
      with:
        module: nbprint
      if: matrix.os == 'ubuntu-latest'

    - uses: actions-ext/python/test-sdist@main
      with:
        module: nbprint
      if: matrix.os == 'ubuntu-latest'

    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: dist-${{matrix.os}}
        path: dist
      if: matrix.os == 'ubuntu-latest'
