name: Copier Updates

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 0"

jobs:
  update:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
    - uses: actions-ext/copier-update@378500315a83b5985e175139a55f1fa5ea6dde09
      with:
        token: ${{ secrets.WORKFLOW_TOKEN }}
