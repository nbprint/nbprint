<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fixture: Section heading + tall table in next cell</title>
<script>
var _nbprint_configuration = { pagedjs: true, debug: false, page: "{\"orientation\": null, \"size\": null}" };
var _nbprint_notebook_info = new Map();
window.FontAwesomeConfig = { searchPseudoElements: true };
</script>
<script type="module" src="/js/dist/embedded.js"></script>
<link rel="stylesheet" href="/js/dist/css/embedded.css" />
<link rel="stylesheet" href="/js/dist/css/index.css" />
<style>
body.jp-Notebook { margin: 0; padding: 0 !important; }
@page { margin: 0.5in; }
table { border-collapse: collapse; width: 100%; }
th, td { border: 1px solid #ccc; padding: 4px 8px; font-size: 11px; }
th { background: #333; color: white; }
.filler-p { font-size: 14px; line-height: 1.5; margin: 0 0 10px; }
</style>
</head>
<body class="jp-Notebook" data-jp-theme-light="true" data-jp-theme-name="JupyterLab Light">
<main>
  <!-- Filler cell pushes the heading toward the bottom of page 1 -->
  <div class="jp-Cell jp-MarkdownCell jp-Notebook-cell">
    <div class="jp-Cell-inputWrapper">
      <div class="jp-InputArea jp-Cell-inputArea">
        <div class="jp-RenderedHTMLCommon jp-RenderedMarkdown jp-MarkdownOutput" id="filler"></div>
      </div>
    </div>
  </div>

  <!-- Section heading cell: emits an H1. In the broken layout this heading
       lands alone at the bottom of page 1 while the table below is pushed
       to page 2. The fix wraps the heading with the first child of the
       next cell's OutputArea into a shared `break-inside: avoid` pair. -->
  <div class="jp-Cell jp-CodeCell jp-Notebook-cell">
    <div class="jp-Cell-outputWrapper">
      <div class="jp-OutputArea jp-Cell-outputArea">
        <div class="jp-OutputArea-child">
          <div class="jp-RenderedHTMLCommon jp-OutputArea-output">
            <h1>Section · Data Summary</h1>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Tall table cell that follows. Wrapped in jp-OutputArea-child
       which in notebook.css has `break-inside: avoid-page`, so without
       the fix the entire table tries to stay atomic. -->
  <div class="jp-Cell jp-CodeCell jp-Notebook-cell">
    <div class="jp-Cell-outputWrapper">
      <div class="jp-OutputArea jp-Cell-outputArea">
        <div class="jp-OutputArea-child">
          <div class="jp-RenderedHTMLCommon jp-OutputArea-output">
            <table>
              <thead>
                <tr><th>#</th><th>Label</th><th>Metric A</th><th>Metric B</th><th>Metric C</th></tr>
              </thead>
              <tbody id="rows"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const filler = document.getElementById('filler');
    let s = '';
    for (let i = 0; i < 30; i++) {
      s += '<p class="filler-p">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</p>';
    }
    filler.innerHTML = s;

    const tbody = document.getElementById('rows');
    for (let i = 1; i <= 80; i++) {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${i}</td><td>Item ${i}</td><td>${i * 1.5}</td><td>${(i * 0.9).toFixed(2)}</td><td>${i % 7}</td>`;
      tbody.appendChild(tr);
    }
  </script>
</main>
</body>
</html>
