<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fixture: Blank Page Trigger</title>
<script>
var _nbprint_configuration = { pagedjs: true, debug: false, page: "{\"orientation\": null, \"size\": null}" };
var _nbprint_notebook_info = new Map();
window.FontAwesomeConfig = { searchPseudoElements: true };
</script>
<script type="module" src="/js/dist/embedded.js"></script>
<link rel="stylesheet" href="/js/dist/css/embedded.css" />
<link rel="stylesheet" href="/js/dist/css/index.css" />
<style>
body.jp-Notebook { margin: 0; padding: 0 !important; }
@page { margin: 0.5in; }
p { font-size: 14px; line-height: 1.6; margin-bottom: 12px; }
</style>
</head>
<body class="jp-Notebook" data-jp-theme-light="true" data-jp-theme-name="JupyterLab Light">
<main>
  <div class="jp-Cell">
    <div class="jp-Cell-outputWrapper">
      <div class="jp-OutputArea jp-Cell-outputArea">
        <div class="jp-OutputArea-output jp-RenderedHTMLCommon" id="content"></div>
        <script>
          // Fill exactly one page, then add a large-margin element that
          // might push an empty wrapper to a new page before real content.
          const content = document.getElementById('content');
          let html = '<h1>Page 1 Content</h1>';
          for (let i = 0; i < 30; i++) {
            html += '<p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam.</p>';
          }
          // Large margin-top element — pagedjs may create a blank page
          // between the filled page and this element
          html += '<div style="margin-top: 200px; padding-top: 100px;"><h2>Delayed Section</h2>';
          html += '<p>This section has a large margin-top that could cause pagedjs to insert a blank page.</p>';
          for (let i = 0; i < 15; i++) {
            html += '<p>More content after the large gap. Duis aute irure dolor in reprehenderit in voluptate.</p>';
          }
          html += '</div>';
          content.innerHTML = html;
        </script>
      </div>
    </div>
  </div>
</main>
</body>
</html>
