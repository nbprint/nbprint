<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fixture: Wide Column Table</title>
<script>
var _nbprint_configuration = { pagedjs: true, debug: false, page: "{\"orientation\": null, \"size\": null}" };
var _nbprint_notebook_info = new Map();
window.FontAwesomeConfig = { searchPseudoElements: true };
</script>
<script type="module" src="/js/dist/embedded.js"></script>
<link rel="stylesheet" href="/js/dist/css/embedded.css" />
<link rel="stylesheet" href="/js/dist/css/index.css" />
<style>
body.jp-Notebook { margin: 0; padding: 0 !important; }
@page { margin: 0.5in; }
table { border-collapse: collapse; }
th, td { border: 1px solid #ddd; padding: 6px 10px; text-align: left; font-size: 12px; white-space: nowrap; }
th { background-color: #3498db; color: white; }
tr:nth-child(even) { background-color: #f2f2f2; }
</style>
</head>
<body class="jp-Notebook" data-jp-theme-light="true" data-jp-theme-name="JupyterLab Light">
<main>
  <div class="jp-Cell">
    <div class="jp-Cell-outputWrapper">
      <div class="jp-OutputArea jp-Cell-outputArea">
        <div class="jp-OutputArea-output jp-RenderedHTMLCommon">
          <h2>Wide Table</h2>
        </div>
      </div>
    </div>
  </div>
  <div class="jp-Cell">
    <div class="jp-Cell-outputWrapper">
      <div class="jp-OutputArea jp-Cell-outputArea">
        <div class="jp-OutputArea-output jp-RenderedHTMLCommon">
          <!-- Table with many columns that exceed page width, but few rows (fits vertically) -->
          <table id="wide-table">
            <thead>
              <tr id="header-row"></tr>
            </thead>
            <tbody id="table-body"></tbody>
          </table>
          <script>
            // Generate 20 columns — wide enough to overflow page width
            const headerRow = document.getElementById('header-row');
            const tbody = document.getElementById('table-body');
            const colCount = 20;
            const rowCount = 5;

            for (let c = 0; c < colCount; c++) {
              const th = document.createElement('th');
              th.textContent = `Column ${c + 1} Header`;
              headerRow.appendChild(th);
            }

            for (let r = 1; r <= rowCount; r++) {
              const tr = document.createElement('tr');
              for (let c = 0; c < colCount; c++) {
                const td = document.createElement('td');
                td.textContent = `R${r}C${c + 1} value data`;
                tr.appendChild(td);
              }
              tbody.appendChild(tr);
            }
          </script>
        </div>
      </div>
    </div>
  </div>
  <div class="jp-Cell">
    <div class="jp-Cell-outputWrapper">
      <div class="jp-OutputArea jp-Cell-outputArea">
        <div class="jp-OutputArea-output jp-RenderedHTMLCommon">
          <p>Content after the wide table.</p>
        </div>
      </div>
    </div>
  </div>
</main>
</body>
</html>
