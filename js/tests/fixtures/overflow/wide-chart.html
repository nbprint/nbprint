<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fixture: Wide Chart</title>
<script>
var _nbprint_configuration = { pagedjs: true, debug: false, page: "{\"orientation\": null, \"size\": null}" };
var _nbprint_notebook_info = new Map();
window.FontAwesomeConfig = { searchPseudoElements: true };
</script>
<script type="module" src="/js/dist/embedded.js"></script>
<link rel="stylesheet" href="/js/dist/css/embedded.css" />
<link rel="stylesheet" href="/js/dist/css/index.css" />
<style>
body.jp-Notebook { margin: 0; padding: 0 !important; }
@page { margin: 0.5in; }
</style>
</head>
<body class="jp-Notebook" data-jp-theme-light="true" data-jp-theme-name="JupyterLab Light">
<main>
  <div class="jp-Cell">
    <div class="jp-Cell-outputWrapper">
      <div class="jp-OutputArea jp-Cell-outputArea">
        <div class="jp-OutputArea-output jp-RenderedImage">
          <!-- 1200px wide SVG that exceeds typical page width -->
          <svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
            <rect width="1200" height="400" fill="#2ecc71" />
            <text x="600" y="200" text-anchor="middle" fill="white" font-size="30">Wide Chart (1200x400)</text>
            <!-- Simulated bar chart -->
            <rect x="50" y="250" width="80" height="120" fill="#27ae60" />
            <rect x="180" y="200" width="80" height="170" fill="#27ae60" />
            <rect x="310" y="280" width="80" height="90" fill="#27ae60" />
            <rect x="440" y="230" width="80" height="140" fill="#27ae60" />
            <rect x="570" y="260" width="80" height="110" fill="#27ae60" />
            <rect x="700" y="210" width="80" height="160" fill="#27ae60" />
            <rect x="830" y="240" width="80" height="130" fill="#27ae60" />
            <rect x="960" y="270" width="80" height="100" fill="#27ae60" />
            <rect x="1090" y="220" width="80" height="150" fill="#27ae60" />
          </svg>
        </div>
      </div>
    </div>
  </div>
  <div class="jp-Cell">
    <div class="jp-Cell-outputWrapper">
      <div class="jp-OutputArea jp-Cell-outputArea">
        <div class="jp-OutputArea-output jp-RenderedHTMLCommon">
          <p>Content after the wide chart.</p>
        </div>
      </div>
    </div>
  </div>
</main>
</body>
</html>
