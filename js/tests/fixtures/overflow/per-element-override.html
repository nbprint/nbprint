<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fixture: Per-Element Overflow Override</title>
<script>
var _nbprint_configuration = {
  pagedjs: true,
  debug: false,
  page: "{\"orientation\": null, \"size\": null, \"overflow_strategy\": \"scale\"}"
};
var _nbprint_notebook_info = new Map();
window.FontAwesomeConfig = { searchPseudoElements: true };
</script>
<script type="module" src="/js/dist/embedded.js"></script>
<link rel="stylesheet" href="/js/dist/css/embedded.css" />
<link rel="stylesheet" href="/js/dist/css/index.css" />
<style>
body.jp-Notebook { margin: 0; padding: 0 !important; }
@page { margin: 0.5in; }
</style>
</head>
<body class="jp-Notebook" data-jp-theme-light="true" data-jp-theme-name="JupyterLab Light">
<main>
  <div class="jp-Cell">
    <div class="jp-Cell-outputWrapper">
      <div class="jp-OutputArea jp-Cell-outputArea">
        <div class="jp-OutputArea-output jp-RenderedHTMLCommon">
          <h1>Per-Element Override Test</h1>
          <p>Global strategy is "scale", but the wide div below has data-nbprint-overflow="clip" to override.</p>
          <!-- Wide div with per-element clip override -->
          <div data-nbprint-overflow="clip">
            <div id="clipped-element" style="width: 2000px; height: 100px; background: #cce5ff;">
              This div is 2000px wide but should be CLIPPED (not scaled) via per-element override.
            </div>
          </div>
          <p>More content after.</p>
        </div>
      </div>
    </div>
  </div>
</main>
</body>
</html>
